<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <h1>Aether Cue Gallery</h1>
    <div>
        <a href="index.html">Beranda</a>
        <a href="cart.html">Keranjang</a>
    </div>
</nav>

<section id="detailContainer"></section>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="script.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
    document.getElementById("detailContainer").innerHTML =
    "<h2 style='padding:40px'>ID produk tidak ditemukan</h2>";
}else{
    db.collection("produk").doc(id).get().then(doc => {
        if(!doc.exists){
            document.getElementById("detailContainer").innerHTML =
            "<h2 style='padding:40px'>Produk tidak ditemukan</h2>";
            return;
        }

        let produk = doc.data();
        let spesifikasi = Array.isArray(produk.spesifikasi) ? produk.spesifikasi : [];

        let namaAman = String(produk.nama || "").replace(/'/g, "\\'");
        let gambarAman = String(produk.gambar || "").replace(/'/g, "\\'");
        let hargaAman = Number(produk.harga || 0);

        document.getElementById("detailContainer").innerHTML = `
            <div class="detail-page">
                <img src="${produk.gambar}" onerror="this.src='https://via.placeholder.com/450x350?text=No+Image'">

                <div class="detail-info">
                    <h2>${produk.nama || "-"}</h2>
                    <h3>Rp ${hargaAman.toLocaleString("id-ID")}</h3>

                    <h4>Spesifikasi Produk:</h4>

                    <ul>
                        ${spesifikasi.map(spek => `<li>${spek}</li>`).join("")}
                    </ul>

                    <button onclick="tambahKeranjang(
                        '${namaAman}',
                        ${hargaAman},
                        '${gambarAman}'
                    )">
                        Tambah ke Keranjang
                    </button>
                </div>
            </div>
        `;
    }).catch(error => {
        document.getElementById("detailContainer").innerHTML =
        "<h2 style='padding:40px'>Gagal membuka detail: " + error.message + "</h2>";
    });
}
</script>

</body>
</html>
