<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <h1>Aether Cue Gallery</h1>
    <div>
        <a href="index.html">Beranda</a>
        <a href="cart.html">Keranjang</a>
    </div>
</nav>

<header class="hero">
    <h2 id="judulKategori">Produk</h2>
</header>

<section class="products" id="produkContainer"></section>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const kategori = params.get("kategori") || "meja";

document.getElementById("judulKategori").innerText =
"Kategori: " + kategori;

const container = document.getElementById("produkContainer");
container.innerHTML = "<h2>Memuat produk...</h2>";

db.collection("produk")
.where("kategori", "==", kategori)
.onSnapshot(snapshot => {
    container.innerHTML = "";

    if(snapshot.empty){
        container.innerHTML = "<h2>Produk belum tersedia</h2>";
        return;
    }

    snapshot.forEach(doc => {
        let item = doc.data();

        container.innerHTML += `
            <div class="card">
                <img src="${item.gambar}" onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'">
                <h2>${item.nama || "-"}</h2>
                <p>Rp ${Number(item.harga || 0).toLocaleString("id-ID")}</p>
                <a href="detail.html?id=${doc.id}">Lihat Detail</a>
            </div>
        `;
    });
}, error => {
    container.innerHTML = "<h2>Gagal mengambil produk: " + error.message + "</h2>";
});
</script>

</body>
</html>
